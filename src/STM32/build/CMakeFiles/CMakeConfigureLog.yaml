         协定 - 生成代码时考虑浮点收缩
         except[-] - 在生成代码时考虑浮点异常
         fast - "fast" 浮点模型；结果可预测性比较低
         precise - "precise" 浮点模型；结果可预测
         strict - "strict" 浮点模型(意味着 /fp:except)
      即使使用 /fp:except，/Qfast_transcendentals 也生成内联内部 FP
      /Qspectre[-] 对 CVE 2017-5753 启用缓解措施
      /Qpar[-] 启用并行代码生成               
